name: Release NDI Companion

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            build_args: "--win --x64"
          - os: macos-13
            label: macOS x64
            build_args: "--mac --x64"
          - os: macos-latest
            label: macOS arm64
            build_args: "--mac --arm64"
          - os: ubuntu-latest
            label: Linux x64
            build_args: "--linux --x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build platform archive
        run: node build.js ${{ matrix.build_args }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
